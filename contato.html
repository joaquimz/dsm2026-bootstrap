<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootMusic | Cadastro de Produto</title>
    <link rel="icon" href="img/iconemusic.webp" type="image/webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-apple-music"></i></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 col-lg-6">
                <h3 class="mb-4">Cadastro de Produto</h3>
                
                <form class="row g-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome do Produto" required>
                            <label for="nome">Nome do Produto</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="number" name="valor" id="valor" class="form-control" step="0.5" min="0" placeholder="Valor (R$)" required>
                            <label for="valor">Valor (R$)</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="number" name="quantidade" id="quantidade" class="form-control" min="1" placeholder="Quantidade" required>
                            <label for="quantidade">Quantidade</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-floating">
                            <select name="categoria" id="categoria" class="form-select" required>
                                <option value="" selected disabled>Selecione</option>
                                <option value="instrumentos">Instrumentos</option>
                                <option value="acessorios">Acessórios</option>
                                <option value="audio">Áudio/Som</option>
                            </select>
                            <label for="categoria">Categoria</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label d-block mb-2">Fabricado em:</label>
                        <div class="form-check form-check-inline">
                            <input type="radio" name="origem" id="sp" value="sp" class="form-check-input" required>
                            <label for="sp" class="form-check-label">São Paulo (SP)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" name="origem" id="rj" value="rj" class="form-check-input">
                            <label for="rj" class="form-check-label">Rio de Janeiro (RJ)</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="origem" id="mg" value="mg" class="form-check-input">
                            <label for="mg" class="form-check-label">Minas Gerais (MG)</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" name="confirmacao" id="confirmacao" class="form-check-input" required>
                            <label for="confirmacao" class="form-check-label">As informações acima estão corretas</label>
                        </div>
                    </div>

                    <div class="col-12 mt-4 mb-5">
                        <button type="submit" class="btn btn-primary">Cadastrar Produto</button>
                        <button type="reset" class="btn btn-secondary ">Limpar</button>
                        <button type="button" class="btn btn-danger">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
